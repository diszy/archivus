<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivus Combat Tracker v20</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body { font-family: sans-serif; background:#111; color:#fff; margin:0; }
table { width:100%; font-size:20px; }
td { padding:10px; }
.panel { padding:8px; }
button { padding:6px 8px; }
</style>

<script>
const APP_VERSION = "v20";
const savedVersion = localStorage.getItem("app_version");
if (savedVersion !== APP_VERSION) {
  localStorage.setItem("app_version", APP_VERSION);
  location.reload(true);
}
</script>

</head>
<body>

<h2 style="text-align:center;">Archivus Combat Tracker</h2>

<table border="1">
<tr><th>Name</th><th>HP</th><th>AC</th><th>Sheet</th></tr>
<tr>
<td>Player</td>
<td><input value="20" style="width:60px"></td>
<td><input value="15" style="width:50px"></td>
<td><button onclick="openSheet()">Sheet</button></td>
</tr>
</table>

<div id="sheet" style="display:none; position:fixed; top:10%; left:5%; width:90%; background:#222; padding:20px;">
<h3>Player Sheet</h3>

<label>Passive Perception</label>
<input id="pp"><br>

<label>Spell Save DC</label>
<input id="dc"><br>

<label>Spell Attack</label>
<input id="atk"><br>

<h4>Spell Slots</h4>
<div id="slots"></div>

<button onclick="save()">Save</button>
<button onclick="closeSheet()">Close</button>
</div>

<script>
function openSheet(){
 document.getElementById("sheet").style.display="block";
 load();
}
function closeSheet(){
 document.getElementById("sheet").style.display="none";
}

function save(){
 const data = {
  pp: pp.value,
  dc: dc.value,
  atk: atk.value
 };
 localStorage.setItem("player_main", JSON.stringify(data));
 alert("Saved");
}

function load(){
 const data = JSON.parse(localStorage.getItem("player_main"))||{};
 pp.value = data.pp||"";
 dc.value = data.dc||"";
 atk.value = data.atk||"";
}

</script>

</body>
</html>
